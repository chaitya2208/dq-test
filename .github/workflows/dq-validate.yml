# Data Quality - Shift-Left DDL Validation (SOFT / pass-fail only)
#
# On every push or PR that changes a changelog, validate each CREATE TABLE
# against the Data Quality Platform backend and report pass/fail in the
# Checks tab + job summary. SOFT MODE: never fails the job, so a PR is never
# blocked -- findings are informational for now.
#
# Requirements while this runs (all on the self-hosted runner's machine):
#   1. Backend running at localhost:8000 (Snowflake SSO already done)
#   2. Self-hosted runner running:  cd C:\Users\cshah\actions-runner ; ./run.cmd
#
# The runner is Windows, so run steps use shell: powershell.
# IMPORTANT: keep this script ASCII-only. The Windows runner reads the YAML as
# cp1252, so any Unicode (em-dash, checkmarks, box-drawing) turns into mojibake
# that breaks PowerShell string quoting and fails the whole job at parse time.
#
# NOTE: validate_ddl.py validates ONE CREATE TABLE per file -- keep one table
# per changelog file (see changelogs/v1_orders.sql, v2_customers.sql).

name: Data Quality - DDL Validation (soft)

on:
  push:
    paths:
      - 'changelogs/**'
  pull_request:
    paths:
      - 'changelogs/**'
  workflow_dispatch:

concurrency:
  group: dq-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dq-validate:
    name: Data Quality Gate (soft)
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate changelog DDL
        shell: powershell
        env:
          DQ_URL: ${{ secrets.DQ_URL }}
        run: |
          $ErrorActionPreference = "Continue"
          $dqUrl = if ($env:DQ_URL) { $env:DQ_URL } else { "http://localhost:8000" }

          $files = Get-ChildItem -Path "changelogs" -Recurse -Include "*.sql" -ErrorAction SilentlyContinue
          if ($files.Count -eq 0) {
            "No .sql changelogs found - nothing to validate." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
            exit 0
          }

          "## Data Quality - DDL Validation (soft)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

          $anyBlocking = $false
          foreach ($f in $files) {
            Write-Host "----------------------------------------------"
            Write-Host "Validating: $($f.Name)"
            # --allow-offline: warn (not error) if the backend is unreachable.
            # Malformed SQL still reports a failure.
            python ci/validate_ddl.py --sql $f.FullName --url $dqUrl --fail-on critical high --allow-offline
            if ($LASTEXITCODE -ne 0) {
              $anyBlocking = $true
              "- [FAIL] ``$($f.Name)`` - blocking findings (see logs)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
            } else {
              "- [PASS] ``$($f.Name)`` - passed" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
            }
          }

          "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          if ($anyBlocking) {
            "WARNING: Blocking findings reported (soft mode - PR not blocked)." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          } else {
            "OK: All changed DDL passed." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          }

          # SOFT MODE: always succeed.
          exit 0
